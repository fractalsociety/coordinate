name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # 1. Create a draft GitHub Release so all build jobs can upload into it
  # ---------------------------------------------------------------------------
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract tag and version
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"       >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches Cargo.toml version
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match Cargo.toml ($CARGO_VERSION)"
            exit 1
          fi

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --draft \
            --title "${{ steps.tag.outputs.tag }}" \
            --generate-notes

  # ---------------------------------------------------------------------------
  # 2. Build release binaries for each target platform
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: create-release

    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM (Apple Silicon) — native build on ARM runner
          - target: aarch64-apple-darwin
            os: macos-latest
            use-cross: false
            archive-format: tar.gz

          # macOS Intel — cross-compile from ARM runner
          - target: x86_64-apple-darwin
            os: macos-latest
            use-cross: false
            archive-format: tar.gz

          # Linux x86_64 static (musl) — use cross for Docker-based build
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use-cross: true
            archive-format: tar.gz

          # Windows x86_64 — native MSVC build on Windows runner
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use-cross: false
            archive-format: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --locked

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }}
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi

      - name: Strip binary
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/squad"
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-musl)
              # cross builds inside Docker; strip if available on host
              strip "$BIN" 2>/dev/null || true
              ;;
            x86_64-pc-windows-msvc)
              ;;
            *-apple-darwin)
              strip "$BIN"
              ;;
          esac

      - name: Create archive
        id: archive
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          FORMAT="${{ matrix.archive-format }}"
          STAGING="staging-$TARGET"

          mkdir -p "$STAGING"

          if [ "$FORMAT" = "zip" ]; then
            ARCHIVE="squad-$TARGET.zip"
            cp "target/$TARGET/release/squad.exe" "$STAGING/"
            for f in README.md LICENSE CHANGELOG.md; do
              [ -f "$f" ] && cp "$f" "$STAGING/"
            done
            7z a "$ARCHIVE" "./$STAGING/*"
          else
            ARCHIVE="squad-$TARGET.tar.gz"
            cp "target/$TARGET/release/squad" "$STAGING/"
            for f in README.md LICENSE CHANGELOG.md; do
              [ -f "$f" ] && cp "$f" "$STAGING/"
            done
            tar -czf "$ARCHIVE" -C "$STAGING" .
          fi

          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"

      - name: Upload archive to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.create-release.outputs.tag }}" \
            "${{ steps.archive.outputs.archive }}" \
            --clobber

  # ---------------------------------------------------------------------------
  # 3. After all builds complete, generate a combined SHA256SUMS file
  # ---------------------------------------------------------------------------
  checksums:
    name: SHA256 Checksums
    runs-on: ubuntu-latest
    needs: [create-release, build]

    steps:
      - name: Download all release archives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ needs.create-release.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "squad-*" \
            --dir release

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          cd release
          for f in squad-*.tar.gz squad-*.zip; do
            [ -e "$f" ] && shasum -a 256 "$f"
          done | tee ../SHA256SUMS

      - name: Upload checksums to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.create-release.outputs.tag }}" SHA256SUMS \
            --repo "${{ github.repository }}"

  # ---------------------------------------------------------------------------
  # 4. Publish the draft release (undraft it)
  # ---------------------------------------------------------------------------
  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [create-release, checksums]

    steps:
      - name: Mark release as published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ needs.create-release.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --draft=false

  # ---------------------------------------------------------------------------
  # 5. Publish to crates.io (optional, after release is live)
  # ---------------------------------------------------------------------------
  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: publish-release
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ---------------------------------------------------------------------------
  # 6. Update Homebrew tap formula with new version and SHA256 hashes
  # ---------------------------------------------------------------------------
  update-homebrew:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs: [create-release, publish-release]
    steps:
      - name: Trigger Homebrew tap update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          gh workflow run update-formula.yml \
            -f version="${{ needs.create-release.outputs.tag }}" \
            -R fractalsociety/homebrew-tap
